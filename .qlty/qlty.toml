# Qlty configuration for pi-searxng (TypeScript / Node ESM extension).
# See https://qlty.sh/d/qlty-toml for the full reference.
config_version = "0"

# Generated/compiled output and vendored deps are not source we own.
exclude_patterns = [
  "**/*.min.*",
  "**/*.d.ts",
  "**/dist/**",
  "**/build/**",
  "**/node_modules/**",
]

# Treat our Vitest specs as tests (relaxes some smell thresholds).
test_patterns = [
  "**/*.test.ts",
  "**/*.spec.ts",
]

[smells]
mode = "comment"

[[source]]
name = "default"
default = true

# Dependency vulnerability scanning (package-lock.json).
[[plugin]]
name = "osv-scanner"

# Secret detection across the repo.
[[plugin]]
name = "trufflehog"

# Ignore CVEs in dev/build-only transitive dependencies that are pinned by
# the upstream @earendil-works/pi-coding-agent npm-shrinkwrap.json. These
# packages (protobufjs, ws) are only used at build time for type checking,
# are never included in the shipped extension (dist/), and cannot be bumped
# from this repo because the upstream shrinkwrap overrides consumer
# `overrides`. Revisit when pi-coding-agent ships patched versions.
[[triage]]
match.rules = [
  "osv-scanner:CVE-2026-48712",
  "osv-scanner:CVE-2026-54269",
  "osv-scanner:CVE-2026-48779",
]
match.file_patterns = ["package-lock.json"]
set.ignored = true
